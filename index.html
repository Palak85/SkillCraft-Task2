<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Chronos - A premium, professional stopwatch with glassmorphic design and precise lap tracking.">
    <title>Stopwatch</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Abstract Background Elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="particles" id="particles"></div>

    <main class="app-container">
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-stopwatch-20"></i>
                <span>StopWatch</span>
            </div>
            <div class="status-indicator" id="status-display">
                <span class="dot"></span>
                <span class="text">STANDBY</span>
            </div>
        </header>

        <section class="timer-display-section">
            <div class="glass-card timer-card">
                <div class="timer-visual-container">
                    <svg class="progress-ring" viewBox="0 0 100 100">
                        <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="ring-progress" id="progress-circle" cx="50" cy="50" r="45"></circle>
                    </svg>

                    <div class="time-readout">
                        <div class="main-time">
                            <span id="hours">00</span><span class="divider">:</span><span id="minutes">00</span><span
                                class="divider">:</span><span id="seconds">00</span>
                        </div>
                        <div class="ms-time">
                            <span id="milliseconds">00</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="controls-section">
            <div class="controls-wrapper">
                <button id="lapBtn" class="control-btn lap-btn" title="Record Lap" disabled>
                    <i class="fa-solid fa-flag"></i>
                    <span>LAP</span>
                </button>

                <div class="main-actions">
                    <button id="startBtn" class="control-btn start-btn" title="Start Timer">
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button id="pauseBtn" class="control-btn pause-btn hidden" title="Pause Timer">
                        <i class="fa-solid fa-pause"></i>
                    </button>
                </div>

                <button id="resetBtn" class="control-btn reset-btn" title="Reset Stopwatch">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>RESET</span>
                </button>
            </div>
        </section>

        <section class="laps-section">
            <div class="laps-header">
                <h3><i class="fa-solid fa-list-ul"></i> LAP RECORDS</h3>
                <span id="lap-count" class="badge">0 LAPS</span>
            </div>
            <div class="laps-list" id="laps-container">
                <div class="empty-state">
                    <i class="fa-solid fa- stopwatch-20"></i>
                    <p>No laps recorded yet</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 CHRONOS | Designed for Precision</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
